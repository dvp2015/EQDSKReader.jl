version: 2

updates:

  - package-ecosystem: "github-actions"
    # Workflow files stored in the default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: weekly
      day: tuesday
      time: "11:00"
    open-pull-requests-limit: 10
    target-branch: devel

  - package-ecosystem: "julia"
    directories:
      - "/"
    schedule:
      interval: "weekly"
      day: tuesday
      time: "12:00"
    groups:
      all-julia-packages:
        patterns:
          - "*"
